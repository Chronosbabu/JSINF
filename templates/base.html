<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSINF - Bibliothèque</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        h1 { color: #333; text-align: center; }
        .search-bar { width: 70%; padding: 12px; margin: 20px auto; display: block; font-size: 1.1em; }
        .book { background: white; padding: 20px; margin: 15px auto; width: 70%; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        button, .btn { padding: 12px 20px; margin: 8px 5px; border: none; border-radius: 6px; cursor: pointer; }
        .btn-whatsapp { background: #25D366; color: white; }
        .btn-download { background: #28a745; color: white; }
        .btn-upload { background: #007bff; color: white; padding: 12px 25px; font-size: 1.1em; }
        .flash { padding: 10px; margin: 10px auto; width: 70%; border-radius: 6px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
