{% extends "base.html" %}

{% block content %}
<h1>Publier un nouveau livre</h1>

<form method="POST" enctype="multipart/form-data">
    <label>Titre du livre :</label><br>
    <input type="text" name="title" required style="width:80%; padding:10px; margin:10px 0;"><br>

    <label>Numéro WhatsApp (avec indicatif, ex: 243xxxxxxxxx) :</label><br>
    <input type="text" name="whatsapp" required style="width:80%; padding:10px; margin:10px 0;"><br>

    <label>Description :</label><br>
    <textarea name="description" rows="5" style="width:80%; padding:10px; margin:10px 0;" required></textarea><br>

    <label>Type de livre :</label><br>
    <input type="radio" name="price_type" value="gratuit" checked> Gratuit<br>
    <input type="radio" name="price_type" value="payant"> Payant 
    <input type="number" name="price" step="0.01" placeholder="Prix en $" style="width:150px;"><br><br>

    <label>Sélectionner le fichier (PDF, DOC, DOCX, EPUB) :</label><br>
    <input type="file" name="file" accept=".pdf,.doc,.docx,.epub" required><br><br>

    <button type="submit" style="background:#28a745; color:white; padding:12px 30px; font-size:1.1em;">Publier le livre</button>
</form>

<a href="{{ url_for('home') }}">← Retour à l'accueil</a>
{% endblock %}
